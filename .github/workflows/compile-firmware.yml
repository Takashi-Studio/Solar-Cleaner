name: Compile ESP-01 Firmware

on:
  push:
    paths:
      - 'hardware/esp01_mqtt/esp01_mqtt.ino'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract Firmware Version
        id: get_version
        run: |
          python3 -c "import re; content = open('hardware/esp01_mqtt/esp01_mqtt.ino').read(); match = re.search(r'#define\s+FIRMWARE_VERSION\s+\"([^\"]+)\"', content); open('backend/firmware/version.txt', 'w').write(match.group(1)); print('VERSION=' + match.group(1))"

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP8266 Platform
        run: |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266

      - name: Install Libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "PubSubClient"

      - name: Compile Firmware
        run: |
          mkdir -p backend/firmware
          arduino-cli compile --fqbn esp8266:esp8266:generic --output-dir backend/firmware hardware/esp01_mqtt
          mv backend/firmware/esp01_mqtt.ino.bin backend/firmware/latest.bin
          # تنظيف الملفات المؤقتة غير الضرورية
          rm -f backend/firmware/*.elf backend/firmware/*.map

      - name: Commit and Push Compiled Firmware
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/firmware/latest.bin backend/firmware/version.txt
          # التأكد من وجود تغييرات فعلياً قبل عمل commit لمنع أخطاء التكرار
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(firmware): auto-compile ESP-01 firmware to version $(cat backend/firmware/version.txt) [skip ci]" && git push)
