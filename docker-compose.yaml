version: '3.8'

services:
  # 1. وسيط الـ MQTT (Mosquitto)
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: solar-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always

  # 2. خادم الـ Backend (Node.js + SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_FILE=database.sqlite
      - JWT_SECRET=super_secret_jwt_token_solar_panels_cleaning_saas
      - MQTT_BROKER_URL=mqtt://mqtt-broker:1883
    volumes:
      - sqlite-data:/app
    depends_on:
      - mqtt-broker
    restart: always

  # 3. واجهة الويب الـ Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solar-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  sqlite-data:
